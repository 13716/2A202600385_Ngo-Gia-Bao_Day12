services:
  agent:
    build: .
    # ports: - "8000:8000"  # Removed fixed port to allow scaling
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=super-secret-key-123
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy

  load_balancer:
    image: nginx:alpine
    ports:
      - "8000:80"  # Map host port 8000 to Nginx port 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: ai-agent-network
